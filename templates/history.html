<!DOCTYPE html>
<html>

<head>

    <title>Analysis History</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Inter',sans-serif;

            min-height:100vh;

            padding:40px;

            background:
            linear-gradient(
                135deg,
                #07111f,
                #0f172a,
                #111827
            );

            color:white;
        }

        .container{

            max-width:1300px;

            margin:auto;
        }

        h1{

            font-size:48px;

            margin-bottom:25px;
        }

        .back-btn{

            display:inline-block;

            margin-bottom:25px;

            text-decoration:none;

            color:white;

            padding:12px 20px;

            border-radius:12px;

            background:
            rgba(255,255,255,.08);
        }

        #historySearch{

            width:100%;

            padding:14px;

            margin-bottom:20px;

            border:none;

            border-radius:12px;

            background:rgba(255,255,255,.08);

            color:white;

            font-size:16px;

            outline:none;
        }

        #historySearch::placeholder{

            color:#94a3b8;
        }

        table{

            width:100%;

            border-collapse:collapse;

            overflow:hidden;

            border-radius:20px;

            background:
            rgba(255,255,255,.05);
        }

        th{

            background:
            rgba(255,255,255,.08);

            padding:18px;

            text-align:left;
        }

        td{

            padding:18px;

            border-top:
            1px solid rgba(255,255,255,.08);
        }

        tr:hover{

            background:
            rgba(255,255,255,.04);
        }

        .risk{

            padding:8px 12px;

            border-radius:10px;

            display:inline-block;

            background:
            rgba(251,191,36,.15);

            color:#fde68a;
        }

    </style>

</head>

<body>

<div class="container">

    <a href="/" class="back-btn">
        ← Back To Chatbot
    </a>

    <h1>Analysis History</h1>

    <input
        type="text"
        id="historySearch"
        placeholder="Search restaurant, issue, score or risk..."
        onkeyup="filterHistory()"
    >

    <table id="historyTable">

        <tr>

            <th>Restaurant</th>

            <th>Description</th>

            <th>Detected Issues</th>

            <th>Score</th>

            <th>Risk</th>

            <th>Date</th>

        </tr>

        {% for row in history %}

        <tr>

            <td>{{ row[0] }}</td>

            <td>{{ row[1] }}</td>

            <td>{{ row[2] }}</td>

            <td>{{ row[3] }}%</td>

            <td>
                <span class="risk">
                    {{ row[4] }}
                </span>
            </td>

            <td>{{ row[5] }}</td>

        </tr>

        {% endfor %}

    </table>

</div>

<script>

function filterHistory() {

    let input =
        document.getElementById("historySearch");

    let filter =
        input.value.toUpperCase();

    let table =
        document.getElementById("historyTable");

    let tr =
        table.getElementsByTagName("tr");

    for (let i = 1; i < tr.length; i++) {

        let txtValue =
            tr[i].textContent ||
            tr[i].innerText;

        if (
            txtValue.toUpperCase()
            .indexOf(filter) > -1
        ) {

            tr[i].style.display = "";

        } else {

            tr[i].style.display = "none";
        }
    }
}

</script>

</body>

</html>
